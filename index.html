<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Aid</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    h1 {
      margin-bottom: 10px;
      color: #333;
    }

    p {
      color: #666;
      font-size: 14px;
    }

    .btn {
      display: block;
      margin: 15px 0;
      padding: 15px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }

    .card {
      background: #4CAF50;
    }

    .crypto {
      background: #f7931a;
    }

    /* bouton copy */
    .copy-btn {
      margin-top: 10px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #28a745;
      color: white;
      font-weight: bold;
      cursor: pointer;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.85; }
      100% { opacity: 1; }
    }

    /* zone crypto cachée */
    #cryptoBox {
      display: none;
      margin-top: 15px;
    }

    img {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Support Aid</h1>
  <p>Your support helps provide food and essential needs to people in difficult conditions.</p>

  <!-- STRIPE -->
  <a href="https://buy.stripe.com/bJedR9gpQ9Bx9et0JZ8ww00" class="btn card">
    ❤️ Donate Securely (Card)
  </a>

  <!-- CRYPTO BUTTON -->
  <button id="cryptoBtn" class="btn crypto">
    🪙 Send Crypto Instantly (USDT)
  </button>

  <!-- CRYPTO BOX -->
  <div id="cryptoBox">

    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=TQL1ZQkNopSq13rYxhDkJXcbYstBALmhK1" width="150">

    <p style="font-size:12px;">
      USDT (TRC20): <br>
      <b id="usdt">TQL1ZQkNopSq13rYxhDkJXcbYstBALmhK1</b>
    </p>

    <p style="font-size:11px; color:gray;">
      Network: TRC20 (low fees)
    </p>

    <p style="font-size:11px;">
      Minimum recommended: 5 USDT
    </p>

    <button id="copyBtn" class="copy-btn">
      Copy Address
    </button>

  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

  var cryptoBtn = document.getElementById("cryptoBtn");
  var cryptoBox = document.getElementById("cryptoBox");
  var copyBtn = document.getElementById("copyBtn");

  cryptoBtn.addEventListener("click", function() {
    if (cryptoBox.style.display === "block") {
      cryptoBox.style.display = "none";
    } else {
      cryptoBox.style.display = "block";
    }
  });

  copyBtn.addEventListener("click", function() {
    var text = document.getElementById("usdt").innerText;
    navigator.clipboard.writeText(text);
    alert("Address copied!");
  });

});
</script>

</body>
</html>
