<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Aid</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f6f8;
}

.container {
  max-width:420px;
  margin:auto;
  padding:20px;
  text-align:center;
}

.card {
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1 {
  margin:10px 0;
}

.highlight {
  color:#28a745;
  font-weight:bold;
}

.urgent {
  color:red;
  font-size:13px;
  margin:10px 0;
}

.btn {
  display:block;
  margin:12px 0;
  padding:14px;
  border-radius:10px;
  text-decoration:none;
  color:white;
  font-weight:bold;
}

.card-btn { background:#28a745; }
.crypto-btn { background:#f7931a; }

.copy-btn {
  margin-top:10px;
  padding:12px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:10px;
  font-weight:bold;
  animation:blink 1s infinite;
}

@keyframes blink {
  50% { opacity:0.85; }
}

#cryptoBox { display:none; }

.trust {
  font-size:12px;
  color:gray;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>Support Aid</h1>

<p class="highlight">
Help provide food & essentials to families in need
</p>

<p>
Every contribution directly supports people facing difficult conditions.
</p>

<p class="urgent">
⚠️ Urgent support needed — every donation counts
</p>

<a href="https://buy.stripe.com/bJedR9gpQ9Bx9et0JZ8ww00" class="btn card-btn">
❤️ Donate securely (Card)
</a>

<button id="cryptoBtn" class="btn crypto-btn">
🪙 Send Crypto Instantly
</button>

<p class="trust">
Secure • Fast • Global
</p>

<div id="cryptoBox">

<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=TQL1ZQkNopSq13rYxhDkJXcbYstBALmhK1">

<p>
USDT (TRC20):<br>
<b id="usdt">TQL1ZQkNopSq13rYxhDkJXcbYstBALmhK1</b>
</p>

<button id="copyBtn" class="copy-btn">Copy Address</button>

</div>

</div>
</div>

<script>
document.getElementById("cryptoBtn").onclick = function(){
  var box = document.getElementById("cryptoBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

document.getElementById("copyBtn").onclick = function(){
  var text = document.getElementById("usdt").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>

</body>
</html>
